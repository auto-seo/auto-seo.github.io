name: AutoSEO Daily Pipeline

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      seeds:
        description: 'Comma-separated seed keywords'
        required: false
        default: ''
      max_posts:
        description: 'Maximum posts to generate'
        required: false
        default: '3'

permissions:
  contents: write
  pages: write

env:
  WORKER_URL: ${{ secrets.WORKER_URL }}
  API_KEY: ${{ secrets.API_KEY }}
  SITE_ID: ${{ secrets.SITE_ID }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SEO Pipeline
        run: node scripts/pipeline.mjs
        env:
          SEEDS: ${{ github.event.inputs.seeds || '' }}
          MAX_POSTS: ${{ github.event.inputs.max_posts || '3' }}

      - name: Check for new posts
        id: check_posts
        run: |
          if [ -n "$(git status --porcelain frontend/_posts/)" ]; then
            echo "has_new_posts=true" >> $GITHUB_OUTPUT
          else
            echo "has_new_posts=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push new posts
        if: steps.check_posts.outputs.has_new_posts == 'true'
        run: |
          git config user.name "AutoSEO Bot"
          git config user.email "autoseo-bot@users.noreply.github.com"
          git add frontend/_posts/
          git commit -m "feat: auto-generated SEO content $(date +%Y-%m-%d)"
          git push

  deploy-frontend:
    needs: run-pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: frontend

      - name: Install Jekyll
        working-directory: frontend
        run: |
          gem install jekyll bundler jekyll-seo-tag jekyll-sitemap

      - name: Build Jekyll site
        working-directory: frontend
        run: jekyll build -d ../_site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
